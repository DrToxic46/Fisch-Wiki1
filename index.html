    let currentCategory = 'rods';

    function switchTab(cat) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase().includes(cat)));
        renderSidebar();
    }

    function renderSidebar() {
        const query = document.getElementById('search').value.toLowerCase();
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '';
        database[currentCategory].filter(i => i.name.toLowerCase().includes(query)).forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerText = item.name;
            div.onclick = () => showDetails(item);
            sidebar.appendChild(div);
        });
    }

    function showDetails(item) {
        const panel = document.getElementById('details-panel');
        document.querySelectorAll('.list-item').forEach(el => el.classList.toggle('selected', el.innerText === item.name));

        if (currentCategory === 'rods') {
            panel.innerHTML = `
                <div class="info-card">
                    <h2>${item.name}</h2>
                    <div class="stat-row"><span class="label">Price:</span> ${item.price} C$</div>
                    <div class="stat-row"><span class="label">Luck:</span> +${item.luck}%</div>
                    <div class="stat-row"><span class="label">Lure Speed:</span> ${item.lure}</div>
                    <div class="stat-row"><span class="label">Max Weight:</span> ${item.weight}</div>
                    <div class="passive-box"><strong>PASSIVE ABILITY:</strong><br>${item.passive}</div>
                </div>`;
        } else {
            panel.innerHTML = `
                <div class="info-card">
                    <h2>${item.name} Mutation</h2>
                    <div class="stat-row"><span class="label">Value Multiplier:</span> ${item.mult}</div>
                    <div class="passive-box"><strong>HOW TO OBTAIN:</strong><br>${item.obtain}</div>
                </div>`;
        }
    }

    renderSidebar();
</script>
